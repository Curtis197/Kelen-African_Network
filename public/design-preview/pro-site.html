<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Aïcha Koné · Architecte · Abidjan — Design Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   KELEN — Colors & Type Foundation
   ============================================ */
:root {
  --font-headline: "Manrope", ui-sans-serif, system-ui, sans-serif;
  --font-body:     "Inter",   ui-sans-serif, system-ui, sans-serif;
  --font-mono:     "Geist Mono", ui-monospace, monospace;

  --color-kelen-green-50:  #ECFDF3;
  --color-kelen-green-100: #D1FAE5;
  --color-kelen-green-400: #10b77f;
  --color-kelen-green-500: #009639;
  --color-kelen-green-600: #007A2E;
  --color-kelen-green-700: #006124;
  --color-kelen-green-800: #004D1C;

  --color-kelen-yellow-50:  #FEFCE8;
  --color-kelen-yellow-500: #FCCF00;
  --color-kelen-yellow-600: #D4AD00;

  --color-kelen-red-500: #CE1126;

  --color-bg:        #ffffff;
  --color-fg:        #1A1A1A;
  --color-fg-muted:  #78716C;
  --color-fg-subtle: #A8A29E;

  --color-surface:              #f9f9f8;
  --color-surface-container-low: #f3f4f3;
  --color-surface-container:     #eeeeed;

  --color-border:         #E7E5E4;
  --color-border-strong:  #D6D3D1;

  --radius-xs:  6px;
  --radius-sm:  10px;
  --radius-md:  14px;
  --radius-lg:  24px;
  --radius-full: 9999px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 28px -4px rgba(0,0,0,0.08);
  --shadow-xl: 0 32px 64px -16px rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-fg);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--color-kelen-green-600); text-decoration: none; transition: color .18s ease; }
a:hover { color: var(--color-kelen-green-700); }

/* ============================================================
   KELEN — Pro-site · Classic professional landing page
   ============================================================ */

:root {
  --ks-max: 1160px;
  --ks-gutter: 32px;
}

.ks-section-inner {
  max-width: var(--ks-max);
  margin: 0 auto;
  padding: 0 var(--ks-gutter);
}

.ks-sec { padding: 88px 0; border-top: 1px solid var(--color-border); }
.ks-sec:first-of-type { border-top: 0; }

.ks-sec-head { max-width: 680px; margin-bottom: 48px; }
.ks-sec-head-row { display: flex; justify-content: space-between; align-items: flex-end; max-width: none; gap: 24px; flex-wrap: wrap; }
.ks-sec-head .ks-eyebrow { display: inline-block; margin-bottom: 12px; }
.ks-sec-head .ks-h2 { margin: 0; }

.ks-h2 {
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 32px;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--color-fg);
}

.ks-eyebrow {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--color-fg-muted);
}

.ks-link-arrow {
  font-size: 14px;
  font-weight: 600;
  color: var(--color-kelen-green-700);
  text-decoration: none;
  white-space: nowrap;
}
.ks-link-arrow:hover { text-decoration: underline; text-underline-offset: 3px; }

/* ---------- BUTTONS ---------- */
.ks-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 15px;
  line-height: 1;
  border-radius: 8px;
  padding: 14px 22px;
  border: 1px solid transparent;
  cursor: pointer;
  text-decoration: none;
  transition: background .15s ease, color .15s ease, border-color .15s ease, transform .1s ease;
  white-space: nowrap;
}
.ks-btn:active { transform: translateY(1px); }
.ks-btn-sm { padding: 10px 16px; font-size: 14px; border-radius: 7px; }
.ks-btn-block { width: 100%; }

.ks-btn-primary { background: var(--color-kelen-green-700); color: #fff; }
.ks-btn-primary:hover { background: var(--color-kelen-green-800); color: #fff; }

.ks-btn-ghost { background: transparent; color: var(--color-fg); padding-left: 6px; padding-right: 6px; }
.ks-btn-ghost:hover { color: var(--color-kelen-green-700); }

/* ---------- NAV ---------- */
.ks-nav {
  position: sticky; top: 0; z-index: 50;
  background: #fff;
  border-bottom: 1px solid transparent;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.ks-nav.is-scrolled { border-bottom-color: var(--color-border); box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
.ks-nav-inner {
  max-width: var(--ks-max);
  margin: 0 auto;
  padding: 16px var(--ks-gutter);
  display: flex;
  align-items: center;
  gap: 40px;
}
.ks-nav-brand {
  display: inline-flex; align-items: center; gap: 12px;
  text-decoration: none;
  color: inherit;
  margin-right: auto;
}
.ks-nav-mono {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--color-kelen-green-700);
  color: #fff;
  font-family: var(--font-headline);
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.02em;
  border-radius: 8px;
}
.ks-nav-names { display: flex; flex-direction: column; line-height: 1.1; }
.ks-nav-name { font-family: var(--font-headline); font-weight: 700; font-size: 15px; color: var(--color-fg); letter-spacing: -0.01em; }
.ks-nav-role { font-size: 12px; color: var(--color-fg-muted); margin-top: 2px; }

.ks-nav-links { display: flex; gap: 28px; }
.ks-nav-links a {
  font-size: 14px;
  font-weight: 500;
  color: var(--color-fg);
  text-decoration: none;
  transition: color .15s ease;
}
.ks-nav-links a:hover { color: var(--color-kelen-green-700); }

/* ---------- HERO ---------- */
.ks-hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
.ks-hero-image { position: absolute; inset: 0; width: 100%; height: 100%; }
.ks-hero-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ks-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 100%);
  display: flex;
  align-items: flex-end;
  padding-bottom: 64px;
}
.ks-hero-h1 {
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: clamp(42px, 5.5vw, 72px);
  line-height: 1.1;
  letter-spacing: -0.03em;
  color: #fff;
  margin: 0 0 8px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.ks-hero-role {
  font-size: 18px;
  line-height: 1.4;
  color: rgba(255,255,255,0.9);
  margin: 0 0 12px;
  font-weight: 500;
  text-shadow: 0 1px 8px rgba(0,0,0,0.3);
}
.ks-hero-subtitle {
  font-size: 20px;
  line-height: 1.5;
  color: rgba(255,255,255,0.85);
  margin: 0 0 24px;
  font-weight: 400;
  text-shadow: 0 1px 8px rgba(0,0,0,0.3);
  max-width: 42ch;
}
.ks-hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
.ks-btn-ghost-light {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(8px);
}
.ks-btn-ghost-light:hover { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); color: #fff; }

/* ---------- PRESENTATION ---------- */
.ks-present { background: #fff; }
.ks-present-grid {
  display: grid;
  grid-template-columns: 200px minmax(0, 1fr);
  gap: 64px;
  align-items: flex-start;
}
.ks-eyebrow-col { padding-top: 6px; }
.ks-present-lead {
  font-family: var(--font-headline);
  font-weight: 500;
  font-size: 26px;
  line-height: 1.35;
  letter-spacing: -0.015em;
  color: var(--color-fg);
  margin: 0 0 20px;
  max-width: 32ch;
}
.ks-present-body {
  font-size: 16px;
  line-height: 1.7;
  color: var(--color-fg-muted);
  margin: 0 0 32px;
  max-width: 60ch;
}
.ks-present-meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--color-border);
}
.ks-present-meta > div { display: flex; flex-direction: column; gap: 4px; }
.ks-meta-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-fg-muted); }
.ks-meta-val { font-size: 15px; color: var(--color-fg); font-weight: 500; line-height: 1.4; }

/* ---------- QUALITIES ---------- */
.ks-presentation { background: #fff; }
.ks-qualities-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
}
.ks-quality-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 12px;
  padding: 32px 28px;
  text-align: center;
  transition: transform .3s ease, box-shadow .3s ease;
}
.ks-quality-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.ks-quality-icon { font-size: 48px; line-height: 1; margin-bottom: 16px; }
.ks-quality-h { font-family: var(--font-headline); font-weight: 700; font-size: 20px; color: var(--color-fg); margin: 0 0 12px; letter-spacing: -0.01em; }
.ks-quality-d { font-size: 15px; color: var(--color-fg-muted); line-height: 1.6; margin: 0; }

/* ---------- SERVICES WITH IMAGES ---------- */
.ks-services-img-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
}
.ks-svc-img-card {
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 12px;
  overflow: hidden;
  transition: box-shadow .3s ease, transform .3s ease;
}
.ks-svc-img-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
.ks-svc-img { aspect-ratio: 16 / 9; overflow: hidden; background: var(--color-surface); }
.ks-svc-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; }
.ks-svc-img-card:hover .ks-svc-img img { transform: scale(1.05); }
.ks-svc-img-content { padding: 24px; }
.ks-svc-num { font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: var(--color-kelen-green-700); letter-spacing: 0.04em; }
.ks-svc-h { font-family: var(--font-headline); font-weight: 700; font-size: 20px; letter-spacing: -0.01em; color: var(--color-fg); margin: 8px 0 0; }
.ks-svc-d { font-size: 15px; color: var(--color-fg-muted); line-height: 1.6; margin: 8px 0 0; flex: 1; }
.ks-svc-price { display: flex; flex-direction: column; gap: 2px; padding-top: 16px; border-top: 1px solid var(--color-border); margin-top: 16px; }
.ks-svc-price span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-fg-muted); font-weight: 600; }
.ks-svc-price strong { font-family: var(--font-headline); font-weight: 700; font-size: 15px; color: var(--color-fg); }

/* ---------- SERVICES OFFERED ---------- */
.ks-services-offered { background: var(--color-surface); }

/* ---------- PORTFOLIO ---------- */
.ks-portfolio { background: #fff; }
.ks-port-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 24px 20px; }
.ks-port-item { margin: 0; display: flex; flex-direction: column; gap: 14px; }
.ks-port-img { overflow: hidden; border-radius: 8px; background: var(--color-surface); aspect-ratio: 4 / 3; }
.ks-port-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; }
.ks-port-item:hover .ks-port-img img { transform: scale(1.02); }
.ks-port-title { font-family: var(--font-headline); font-weight: 700; font-size: 16px; color: var(--color-fg); letter-spacing: -0.005em; }
.ks-port-meta { font-size: 13px; color: var(--color-fg-muted); margin-top: 2px; }

/* ---------- REVIEWS ---------- */
.ks-reviews { background: var(--color-surface); }
.ks-reviews-grid {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}
.ks-reviews-grid::-webkit-scrollbar { height: 8px; }
.ks-reviews-grid::-webkit-scrollbar-track { background: var(--color-surface-container); border-radius: 4px; }
.ks-reviews-grid::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 4px; }
.ks-review {
  flex: 0 0 360px;
  scroll-snap-align: start;
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 10px;
  padding: 28px;
  margin: 0;
  display: flex; flex-direction: column; gap: 16px;
}
.ks-review-stars { color: #D4AD00; letter-spacing: 2px; font-size: 15px; }
.ks-review-text { font-family: var(--font-headline); font-weight: 500; font-size: 17px; line-height: 1.5; letter-spacing: -0.01em; color: var(--color-fg); margin: 0; flex: 1; }
.ks-review footer { padding-top: 16px; border-top: 1px solid var(--color-border); }
.ks-review-who { font-weight: 700; font-size: 14px; color: var(--color-fg); }
.ks-review-proj { font-size: 13px; color: var(--color-fg-muted); margin-top: 2px; }
.ks-reviews-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--color-border); font-size: 13px; color: var(--color-fg-muted); gap: 16px; flex-wrap: wrap; }

/* ---------- PRODUCTS ---------- */
.ks-products { background: #fff; }
.ks-products-grid {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}
.ks-products-grid::-webkit-scrollbar { height: 8px; }
.ks-products-grid::-webkit-scrollbar-track { background: var(--color-surface); border-radius: 4px; }
.ks-products-grid::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 4px; }
.ks-product-card {
  flex: 0 0 340px;
  scroll-snap-align: start;
  background: #fff;
  border: 1px solid var(--color-border);
  border-radius: 12px;
  overflow: hidden;
  transition: box-shadow .3s ease, transform .3s ease;
}
.ks-product-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
.ks-product-img { aspect-ratio: 4 / 3; overflow: hidden; background: var(--color-surface); }
.ks-product-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; }
.ks-product-card:hover .ks-product-img img { transform: scale(1.05); }
.ks-product-info { padding: 20px; }
.ks-product-name { font-family: var(--font-headline); font-weight: 700; font-size: 18px; color: var(--color-fg); margin: 0 0 8px; letter-spacing: -0.01em; }
.ks-product-desc { font-size: 14px; color: var(--color-fg-muted); line-height: 1.6; margin: 0 0 12px; }
.ks-product-price { font-family: var(--font-headline); font-weight: 700; font-size: 20px; color: var(--color-kelen-green-700); letter-spacing: -0.01em; }

/* ---------- FOLLOW ---------- */
.ks-follow { background: var(--color-surface); }
.ks-follow-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 24px; }
.ks-follow-card { background: #fff; border: 1px solid var(--color-border); border-radius: 12px; padding: 32px; display: flex; flex-direction: column; gap: 16px; }
.ks-follow-icon { font-size: 32px; line-height: 1; }
.ks-follow-h { font-family: var(--font-headline); font-weight: 700; font-size: 20px; color: var(--color-fg); margin: 0; letter-spacing: -0.01em; }
.ks-follow-p { font-size: 15px; color: var(--color-fg-muted); line-height: 1.6; margin: 0; flex: 1; }
.ks-follow-form { display: flex; gap: 8px; margin-top: 8px; }
.ks-follow-form input { flex: 1; font-family: var(--font-body); font-size: 14px; padding: 10px 12px; border: 1px solid var(--color-border-strong); border-radius: 8px; background: #fff; }
.ks-follow-form input:focus { outline: none; border-color: var(--color-kelen-green-600); box-shadow: 0 0 0 3px rgba(0,108,73,0.10); }
.ks-follow-socials { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.ks-social-link { display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid var(--color-border-strong); border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--color-fg); text-decoration: none; transition: background .15s ease, border-color .15s ease; }
.ks-social-link:hover { background: var(--color-surface); border-color: var(--color-kelen-green-600); }
.ks-btn-whatsapp { background: #25D366; color: #fff; margin-top: 8px; display: inline-flex; align-items: center; gap: 8px; }
.ks-btn-whatsapp:hover { background: #20BA5A; color: #fff; }

/* ---------- FAQ ---------- */
.ks-faq { background: #fff; }
.ks-faq-inner { max-width: 860px; }
.ks-faq-list { list-style: none; padding: 0; margin: 0; border-top: 1px solid var(--color-border); }
.ks-faq-item { border-bottom: 1px solid var(--color-border); }
.ks-faq-q { width: 100%; background: transparent; border: 0; padding: 22px 0; display: flex; justify-content: space-between; align-items: center; gap: 24px; text-align: left; font-family: var(--font-headline); font-weight: 600; font-size: 17px; line-height: 1.3; letter-spacing: -0.005em; color: var(--color-fg); cursor: pointer; }
.ks-faq-caret { font-size: 22px; color: var(--color-fg-muted); font-weight: 300; transition: transform .2s ease; flex-shrink: 0; }
.ks-faq-item.is-open .ks-faq-caret { transform: rotate(45deg); color: var(--color-kelen-green-700); }
.ks-faq-a { padding: 0 32px 24px 0; font-size: 15px; line-height: 1.65; color: var(--color-fg-muted); max-width: 70ch; }

/* ---------- CONTACT ---------- */
.ks-contact { background: var(--color-surface); }
.ks-contact-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr); gap: 72px; align-items: flex-start; }
.ks-contact-intro .ks-h2 { margin: 12px 0 12px; }
.ks-contact-sub { font-size: 16px; line-height: 1.6; color: var(--color-fg-muted); margin: 0 0 24px; max-width: 40ch; }
.ks-btn-calendar { margin-bottom: 24px; }
.ks-calendar-embed { background: #fff; border: 1px solid var(--color-border); border-radius: 12px; padding: 32px; margin-bottom: 24px; }
.ks-calendar-placeholder { text-align: center; padding: 40px 20px; background: var(--color-surface); border-radius: 8px; border: 2px dashed var(--color-border-strong); }
.ks-calendar-placeholder p { margin: 0 0 8px; font-size: 15px; color: var(--color-fg); font-weight: 600; }
.ks-calendar-note { font-size: 13px !important; color: var(--color-fg-muted) !important; font-weight: 400 !important; }
.ks-contact-divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; text-align: center; }
.ks-contact-divider::before, .ks-contact-divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }
.ks-contact-divider span { font-size: 13px; color: var(--color-fg-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.ks-contact-ways { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0; }
.ks-contact-ways li { display: flex; justify-content: space-between; align-items: baseline; padding: 16px 0; border-top: 1px solid var(--color-border); gap: 16px; }
.ks-contact-ways li:last-child { border-bottom: 1px solid var(--color-border); }
.ks-way-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--color-fg-muted); }
.ks-way-val { font-family: var(--font-mono); font-size: 14px; color: var(--color-kelen-green-800); font-weight: 500; text-decoration: none; text-align: right; }
.ks-way-val.ks-way-plain { color: var(--color-fg); font-family: var(--font-body); font-weight: 500; }
.ks-way-val:hover { text-decoration: underline; text-underline-offset: 3px; }
.ks-form { background: #fff; border: 1px solid var(--color-border); border-radius: 12px; padding: 32px; display: flex; flex-direction: column; gap: 16px; }
.ks-form-title { font-family: var(--font-headline); font-weight: 700; font-size: 18px; color: var(--color-fg); margin: 0 0 8px; letter-spacing: -0.01em; }
.ks-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.ks-field { display: flex; flex-direction: column; gap: 6px; }
.ks-field > span { font-size: 13px; font-weight: 600; color: var(--color-fg); }
.ks-field input, .ks-field textarea, .ks-field select { font-family: var(--font-body); font-size: 15px; color: var(--color-fg); padding: 11px 13px; border: 1px solid var(--color-border-strong); border-radius: 8px; background: #fff; width: 100%; box-sizing: border-box; resize: none; transition: border-color .15s ease, box-shadow .15s ease; }

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel">
/* global React */
const { useState, useEffect } = React;

/* ============================================================ NAV ============================================================ */
function Nav({ pro }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className={`ks-nav ${scrolled ? 'is-scrolled' : ''}`}>
      <div className="ks-nav-inner">
        <a className="ks-nav-brand" href="#top">
          <span className="ks-nav-mono">{pro.monogram}</span>
          <div className="ks-nav-names">
            <span className="ks-nav-name">{pro.name}</span>
            <span className="ks-nav-role">{pro.role}</span>
          </div>
        </a>
        <div className="ks-nav-links">
          <a href="#about">À propos</a>
          <a href="#presentation">Présentation</a>
          <a href="#services">Services</a>
          <a href="#portfolio">Réalisations</a>
          <a href="#produits">Produits</a>
          <a href="#reviews">Avis</a>
          <a href="#contact">Contact</a>
        </div>
        <a href="#contact" className="ks-btn ks-btn-primary ks-btn-sm">Contact</a>
      </div>
    </nav>
  );
}

/* ============================================================ HERO ============================================================ */
function Hero({ pro }) {
  return (
    <header className="ks-hero" id="top">

          <p className="ks-hero-subtitle">{pro.tagline}</p>
          <div className="ks-hero-ctas">
            <a className="ks-btn ks-btn-primary" href="#contact">Contact</a>
            <a className="ks-btn ks-btn-ghost-light" href="#portfolio">Voir les réalisations →</a>
          </div>
        </div>
      </div>
    </header>
  );
}

/* ============================================================ PRESENTATION ============================================================ */
function Presentation({ pro }) {
  return (

            <div><span className="ks-meta-label">Équipe</span><span className="ks-meta-val">{pro.team}</span></div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============================================================ QUALITIES ============================================================ */
function Qualities() {
  const items = [

  return (

              <p className="ks-quality-d">{q.desc}</p>
            </article>

        </div>
      </div>

}

/* ============================================================ SERVICES OFFERED ============================================================ */
function ServicesOffered({ services }) {

            </article>

        </div>
      </div>

}

/* ============================================================ PORTFOLIO ============================================================ */
function Portfolio({ projects }) {

        </div>
      </div>

}

function Faq({ faqs }) {

          <h2 className="ks-h2">Ce que les clients demandent.</h2>
        </div>
        <ul className="ks-faq-list">
          {faqs.map((f, i) => (
            <li key={i} className={`ks-faq-item ${open === i ? 'is-open' : ''}`}>
